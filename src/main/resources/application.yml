spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/releasescribe}
    username: ${DATABASE_USER:releasescribe}
    password: ${DATABASE_PASSWORD:releasescribe}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
