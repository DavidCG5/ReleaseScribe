services:
  postgres:
    image: postgres:16-alpine
    container_name: releasescribe-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DATABASE_DB:-releasescribe}
      POSTGRES_USER: ${DATABASE_USER:-releasescribe}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
